<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evergreen — Test Suite Builder</title>
  <link rel="stylesheet" href="/assets/css/uswds.min.css">
  <style>
    :root {
      --ev-navy: #1b3a5c;
      --ev-blue: #2672de;
      --ev-blue-light: #e8f0fe;
      --ev-green: #0d7a3e;
      --ev-green-bg: #e6f4ea;
      --ev-orange: #c75300;
      --ev-orange-bg: #fff3e0;
      --ev-red: #b71c1c;
      --ev-red-bg: #fce8e8;
      --ev-purple: #6a3d9a;
      --ev-purple-bg: #f3e8ff;
      --ev-g50: #f8f9fa;
      --ev-g100: #f1f3f5;
      --ev-g200: #dee2e6;
      --ev-g300: #ced4da;
      --ev-g400: #adb5bd;
      --ev-g500: #868e96;
      --ev-g600: #495057;
      --ev-g700: #343a40;
      --ev-g800: #212529;
      --sidebar-w: 260px;
      --topbar-h: 56px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Public Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ev-g50); }

    /* ── Unified header ── */
    .ev-header { background: #fff; border-bottom: 1px solid var(--ev-g200); position: sticky; top: 0; z-index: 100; }
    .ev-header-inner { padding: 0 1rem; height: var(--topbar-h); display: flex; align-items: center; justify-content: space-between; }
    .ev-header-logo { font-size: 1.125rem; font-weight: 700; color: var(--ev-navy); text-decoration: none; }
    .ev-header-logo:hover { color: var(--ev-navy); }
    .ev-header-nav { display: flex; align-items: center; gap: 0.5rem; }
    .ev-header-nav .usa-button { font-size: 0.8125rem; padding: 0.35rem 0.75rem; }

    /* ── Layout ── */
    .layout { display: flex; min-height: calc(100vh - var(--topbar-h)); }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0; background: #fff; border-right: 1px solid var(--ev-g200);
      overflow-y: auto; padding: 1rem 0;
    }
    .sidebar-heading { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ev-g500); padding: 0.5rem 1rem 0.25rem; margin-top: 0.5rem; }
    .sidebar-heading:first-child { margin-top: 0; }
    .sidebar-item {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; cursor: pointer;
      border-left: 3px solid transparent; font-size: 0.875rem; color: var(--ev-g700);
      transition: background 0.1s;
    }
    .sidebar-item:hover { background: var(--ev-g50); }
    .sidebar-item.active { background: var(--ev-blue-light); border-left-color: var(--ev-blue); font-weight: 600; }
    .sidebar-icon { font-size: 1.125rem; flex-shrink: 0; }
    .sidebar-label { flex: 1; min-width: 0; }
    .sidebar-label-name { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-label-meta { display: block; font-size: 0.75rem; color: var(--ev-g500); }

    /* ── Main panel ── */
    .main { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; max-width: 900px; }

    /* ── Template header ── */
    .tmpl-desc { color: var(--ev-g600); font-size: 0.875rem; margin-bottom: 0.25rem; }
    .tmpl-source { font-size: 0.8125rem; color: var(--ev-g500); margin-bottom: 1rem; }
    .tmpl-source a { color: var(--ev-blue); }

    /* ── Coverage bar ── */
    .coverage { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-bottom: 1.25rem; padding: 0.75rem 1rem; background: #fff; border: 1px solid var(--ev-g200); border-radius: 6px; }
    .cov-badge { font-size: 0.8125rem; display: flex; align-items: center; gap: 0.25rem; }
    .cov-count { font-weight: 700; }
    .cov-zero { opacity: 0.4; }
    .cov-total { margin-left: auto; font-size: 0.8125rem; color: var(--ev-g500); }

    /* ── System prompt ── */
    .sys-prompt { margin-bottom: 1.25rem; }
    .sys-prompt summary { cursor: pointer; font-size: 0.8125rem; color: var(--ev-g500); }
    .sys-prompt pre { background: var(--ev-g100); padding: 0.75rem; border-radius: 4px; font-size: 0.8125rem; white-space: pre-wrap; word-break: break-word; margin-top: 0.5rem; }

    /* ── Test case cards ── */
    .card {
      background: #fff; border: 1px solid var(--ev-g200); border-radius: 6px;
      margin-bottom: 0.75rem; border-left: 4px solid var(--ev-g300);
      transition: border-left-color 0.15s;
    }
    .card.complete { border-left-color: var(--ev-green); }
    .card.partial { border-left-color: var(--ev-orange); }
    .card[data-metric="safety"] { border-left-color: var(--ev-red); }
    .card[data-metric="accuracy"] { border-left-color: var(--ev-blue); }
    .card[data-metric="ease-of-use"] { border-left-color: var(--ev-green); }
    .card[data-metric="effectiveness"] { border-left-color: var(--ev-orange); }
    .card[data-metric="emotion"] { border-left-color: var(--ev-purple); }

    .card-header {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem 0.75rem;
      cursor: pointer; user-select: none;
    }
    .card-num { font-family: monospace; font-size: 0.8125rem; color: var(--ev-g500); min-width: 1.5rem; }
    .card-metric-pill {
      font-size: 0.6875rem; font-weight: 600; padding: 0.125rem 0.5rem;
      border-radius: 3px; white-space: nowrap; text-transform: capitalize;
    }
    .pill-safety { background: var(--ev-red-bg); color: var(--ev-red); }
    .pill-accuracy { background: var(--ev-blue-light); color: var(--ev-blue); }
    .pill-ease-of-use { background: var(--ev-green-bg); color: var(--ev-green); }
    .pill-effectiveness { background: var(--ev-orange-bg); color: var(--ev-orange); }
    .pill-emotion { background: var(--ev-purple-bg); color: var(--ev-purple); }
    .pill-empty { background: var(--ev-g100); color: var(--ev-g500); }

    .card-severity { font-size: 0.75rem; font-weight: 600; text-transform: capitalize; }
    .sev-critical { color: var(--ev-red); }
    .sev-high { color: var(--ev-orange); }
    .sev-medium { color: var(--ev-blue); }
    .sev-low { color: var(--ev-g500); }

    .card-question-preview { flex: 1; font-size: 0.8125rem; color: var(--ev-g600); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .card-criteria-count { font-size: 0.75rem; color: var(--ev-g400); white-space: nowrap; }
    .card-chevron { color: var(--ev-g400); font-size: 1rem; flex-shrink: 0; transition: transform 0.15s; }
    .card.expanded .card-chevron { transform: rotate(180deg); }

    /* ── Card body (expanded) ── */
    .card-body { display: none; padding: 0.75rem 1rem 1rem; border-top: 1px solid var(--ev-g100); }
    .card.expanded .card-body { display: block; }

    .step-label { font-size: 0.875rem; font-weight: 600; color: var(--ev-g700); margin-bottom: 0.5rem; margin-top: 1rem; }
    .step-label:first-child { margin-top: 0; }
    .step-hint { font-size: 0.8125rem; color: var(--ev-g500); margin-bottom: 0.75rem; }

    /* ── Metric / Severity pills ── */
    .pill-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .pill-btn {
      border: 2px solid var(--ev-g200); background: #fff; border-radius: 6px;
      padding: 0.35rem 0.75rem; font-size: 0.8125rem; cursor: pointer;
      color: var(--ev-g600); font-weight: 500; transition: all 0.1s;
    }
    .pill-btn:hover { border-color: var(--ev-g400); }
    .pill-btn.selected { font-weight: 700; }
    .pill-btn.selected[data-value="safety"] { border-color: var(--ev-red); background: var(--ev-red-bg); color: var(--ev-red); }
    .pill-btn.selected[data-value="accuracy"] { border-color: var(--ev-blue); background: var(--ev-blue-light); color: var(--ev-blue); }
    .pill-btn.selected[data-value="ease-of-use"] { border-color: var(--ev-green); background: var(--ev-green-bg); color: var(--ev-green); }
    .pill-btn.selected[data-value="effectiveness"] { border-color: var(--ev-orange); background: var(--ev-orange-bg); color: var(--ev-orange); }
    .pill-btn.selected[data-value="emotion"] { border-color: var(--ev-purple); background: var(--ev-purple-bg); color: var(--ev-purple); }
    .pill-btn.selected[data-value="critical"] { border-color: var(--ev-red); background: var(--ev-red-bg); color: var(--ev-red); }
    .pill-btn.selected[data-value="high"] { border-color: var(--ev-orange); background: var(--ev-orange-bg); color: var(--ev-orange); }
    .pill-btn.selected[data-value="medium"] { border-color: var(--ev-blue); background: var(--ev-blue-light); color: var(--ev-blue); }
    .pill-btn.selected[data-value="low"] { border-color: var(--ev-g400); background: var(--ev-g100); color: var(--ev-g600); }

    .capability-badge { display: inline-block; background: var(--ev-blue-light); color: var(--ev-blue); font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 3px; margin-bottom: 0.5rem; }

    /* ── Should / Should Not ── */
    .criteria-section { margin-top: 0.5rem; }
    .criteria-row { display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.375rem; }
    .criteria-icon { flex-shrink: 0; margin-top: 0.4rem; font-size: 0.875rem; }
    .criteria-icon.should { color: var(--ev-green); }
    .criteria-icon.shouldnot { color: var(--ev-red); }
    .criteria-input { flex: 1; border: 1px solid var(--ev-g200); border-radius: 4px; padding: 0.35rem 0.5rem; font-size: 0.8125rem; font-family: inherit; resize: vertical; min-height: 2rem; }
    .criteria-input:focus { border-color: var(--ev-blue); outline: none; box-shadow: 0 0 0 2px var(--ev-blue-light); }
    .criteria-remove { background: none; border: none; color: var(--ev-g400); cursor: pointer; font-size: 1rem; padding: 0.25rem; flex-shrink: 0; }
    .criteria-remove:hover { color: var(--ev-red); }
    .add-criteria-btn { background: none; border: 1px dashed var(--ev-g300); color: var(--ev-g500); padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.8125rem; cursor: pointer; margin-top: 0.25rem; }
    .add-criteria-btn:hover { border-color: var(--ev-blue); color: var(--ev-blue); }

    .card-footer { display: flex; justify-content: flex-end; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--ev-g100); }
    .remove-case-btn { background: none; border: none; color: var(--ev-g400); font-size: 0.8125rem; cursor: pointer; padding: 0.25rem 0.5rem; }
    .remove-case-btn:hover { color: var(--ev-red); }

    /* ── Textarea auto-expand ── */
    .question-textarea { width: 100%; border: 1px solid var(--ev-g200); border-radius: 4px; padding: 0.5rem; font-size: 0.875rem; font-family: inherit; resize: vertical; min-height: 3rem; }
    .question-textarea:focus { border-color: var(--ev-blue); outline: none; box-shadow: 0 0 0 2px var(--ev-blue-light); }
    .context-input { width: 100%; border: 1px solid var(--ev-g200); border-radius: 4px; padding: 0.35rem 0.5rem; font-size: 0.8125rem; font-family: inherit; margin-top: 0.5rem; }
    .context-input:focus { border-color: var(--ev-blue); outline: none; box-shadow: 0 0 0 2px var(--ev-blue-light); }

    /* ── Add case button ── */
    .add-case-btn {
      display: flex; align-items: center; gap: 0.5rem; width: 100%;
      background: #fff; border: 2px dashed var(--ev-g300); border-radius: 6px;
      padding: 0.75rem 1rem; font-size: 0.875rem; color: var(--ev-g500);
      cursor: pointer; margin-top: 0.5rem; transition: all 0.1s;
    }
    .add-case-btn:hover { border-color: var(--ev-blue); color: var(--ev-blue); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--ev-g500); }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-state h3 { color: var(--ev-g700); margin: 0 0 0.5rem; }
    .empty-state p { font-size: 0.875rem; max-width: 320px; margin: 0 auto; }

    /* ── Run CTA ── */
    .run-cta { text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--ev-g200); }
    .run-cta p { font-size: 0.875rem; color: var(--ev-g600); margin: 0 0 0.75rem; }

    /* ── Coverage bar label ── */
    .cov-label { font-size: 0.8125rem; font-weight: 600; color: var(--ev-g600); margin-right: 0.25rem; }

    /* ── Mobile template select ── */
    .mobile-template-select { display: none; padding: 0.75rem 1rem; background: #fff; border-bottom: 1px solid var(--ev-g200); }
    .mobile-template-select .usa-label { margin-top: 0; }

    /* ── Footer ── */
    .ev-footer { background: var(--ev-g50); border-top: 1px solid var(--ev-g200); padding: 1.5rem; text-align: center; font-size: 0.8125rem; color: var(--ev-g500); }
    .ev-footer a { color: var(--ev-g600); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-template-select { display: block; }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>

<!-- Public Infrastructure Banner -->
<section class="usa-banner" aria-label="Evergreen — digital public infrastructure">
  <div class="usa-banner__header" style="padding-top:0.5rem;padding-bottom:0.5rem;">
    <div class="usa-banner__inner">
      <div class="grid-col-auto">
        <img class="usa-banner__header-flag" src="/assets/img/us_flag_small.png" alt="U.S. flag">
      </div>
      <div class="grid-col-fill">
        <p class="usa-banner__header-text">This is digital public infrastructure &mdash; by the people, for the people.</p>
      </div>
    </div>
  </div>
</section>

<!-- Header -->
<header class="ev-header">
  <div class="ev-header-inner">
    <a href="/" class="ev-header-logo">Evergreen</a>
    <nav class="ev-header-nav" aria-label="Primary navigation">
      <button id="export-btn" class="usa-button usa-button--outline" onclick="exportCsv()" disabled>Export Sheet</button>
      <button id="run-btn" class="usa-button" onclick="runEval()">Run Evaluation &rarr;</button>
    </nav>
  </div>
</header>

<!-- Mobile template select (visible on narrow screens) -->
<div class="mobile-template-select" id="mobile-select">
  <label class="usa-label" for="mobile-template">Test suite</label>
  <select class="usa-select" id="mobile-template" onchange="if(this.value) loadTemplate(this.value)">
    <option value="">Choose a test suite&hellip;</option>
  </select>
</div>

<!-- Layout -->
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main-panel">
    <p style="color:var(--ev-g500);">Loading test suites&hellip;</p>
  </main>
</div>

<script src="/assets/js/uswds.min.js"></script>
<script>
// ── Constants ──
var METRICS = [
  { id: 'safety', label: 'Safety', icon: '\u{1F6E1}\uFE0F', hint: 'What should the AI never say or imply?' },
  { id: 'accuracy', label: 'Accuracy', icon: '\u{1F3AF}', hint: 'What facts must the response get right?' },
  { id: 'ease-of-use', label: 'Ease of Use', icon: '\u{1F4AC}', hint: 'Can a non-expert understand this without help?' },
  { id: 'effectiveness', label: 'Effectiveness', icon: '\u2705', hint: 'Does it help the person take the right next step?' },
  { id: 'emotion', label: 'Emotion', icon: '\u{1F49C}', hint: 'Does it handle sensitive situations with empathy?' }
];
var SEVERITIES = [
  { id: 'critical', label: 'Critical', hint: 'Wrong answer could cost someone money, benefits, or safety' },
  { id: 'high', label: 'High', hint: 'Significant confusion or misdirection' },
  { id: 'medium', label: 'Medium', hint: 'Noticeable quality issue, but the person can recover' },
  { id: 'low', label: 'Low', hint: 'Minor quality issue, unlikely to cause harm' }
];

// ── State ──
var state = {
  templates: [],
  selectedTemplateId: null,
  template: null,
  cases: [],
  expandedCaseId: null,
  nextId: 1
};

// ── Helpers ──
function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '\u2026' : (s || ''); }
function metricInfo(id) { return METRICS.find(function(m) { return m.id === id; }) || null; }
function sevInfo(id) { return SEVERITIES.find(function(s) { return s.id === id; }) || null; }
function pillClass(metric) { return metric ? 'pill-' + metric : 'pill-empty'; }
function sevClass(sev) { return sev ? 'sev-' + sev : ''; }
function metricLabel(id) { var m = metricInfo(id); return m ? m.icon + ' ' + m.label : ''; }
function caseComplete(c) { return c.metric && c.severity && c.question && (c.should.length > 0 || c.shouldNot.length > 0); }
function casePartial(c) { return c.metric || c.severity || c.question; }
function completionClass(c) { return caseComplete(c) ? 'complete' : casePartial(c) ? 'partial' : ''; }

// ── Rendering ──
function renderSidebar() {
  var html = '';
  var groups = {};
  state.templates.forEach(function(t) {
    var d = t.domain || 'Other';
    if (!groups[d]) groups[d] = [];
    groups[d].push(t);
  });
  Object.keys(groups).forEach(function(domain) {
    html += '<div class="sidebar-heading">' + esc(domain) + '</div>';
    groups[domain].forEach(function(t) {
      var active = t.id === state.selectedTemplateId ? ' active' : '';
      html += '<div class="sidebar-item' + active + '" data-action="select-template" data-id="' + esc(t.id) + '">' +
        '<span class="sidebar-icon">' + esc(t.icon) + '</span>' +
        '<span class="sidebar-label">' +
          '<span class="sidebar-label-name">' + esc(t.name) + '</span>' +
          '<span class="sidebar-label-meta">' + t.caseCount + ' cases</span>' +
        '</span>' +
      '</div>';
    });
  });
  document.getElementById('sidebar').innerHTML = html;

  // Populate mobile template select
  var mobileSelect = document.getElementById('mobile-template');
  if (mobileSelect) {
    var opts = '<option value="">Choose a test suite\u2026</option>';
    state.templates.forEach(function(t) {
      var sel = t.id === state.selectedTemplateId ? ' selected' : '';
      opts += '<option value="' + esc(t.id) + '"' + sel + '>' + esc((t.icon || '') + ' ' + t.name) + '</option>';
    });
    mobileSelect.innerHTML = opts;
  }
}

function renderCoverageBar() {
  var counts = { safety: 0, accuracy: 0, 'ease-of-use': 0, effectiveness: 0, emotion: 0 };
  state.cases.forEach(function(c) { if (c.metric && counts.hasOwnProperty(c.metric)) counts[c.metric]++; });
  var total = state.cases.length;
  var html = '<span class="cov-label">Metric coverage</span>';
  METRICS.forEach(function(m) {
    var n = counts[m.id];
    var cls = n === 0 ? ' cov-zero' : '';
    html += '<span class="cov-badge' + cls + '"><span>' + m.icon + '</span> <span class="cov-count">' + n + '</span></span>';
  });
  html += '<span class="cov-total">' + total + ' total</span>';
  return html;
}

function renderCard(c, idx) {
  var isExpanded = state.expandedCaseId === c._id;
  var m = metricInfo(c.metric);
  var s = sevInfo(c.severity);
  var numCriteria = c.should.length + c.shouldNot.length;
  var expandedCls = isExpanded ? ' expanded' : '';
  var compCls = completionClass(c);
  var metricAttr = c.metric ? ' data-metric="' + c.metric + '"' : '';

  var html = '<div class="card' + expandedCls + (compCls ? ' ' + compCls : '') + '"' + metricAttr + ' data-case-id="' + c._id + '">';

  // Header
  html += '<div class="card-header" data-action="toggle" data-id="' + c._id + '">' +
    '<span class="card-num">' + (idx + 1) + '</span>';
  if (m) {
    html += '<span class="card-metric-pill ' + pillClass(c.metric) + '">' + esc(m.icon + ' ' + m.label) + '</span>';
  } else {
    html += '<span class="card-metric-pill pill-empty">No metric</span>';
  }
  if (s) {
    html += '<span class="card-severity ' + sevClass(c.severity) + '">' + esc(s.label) + '</span>';
  }
  html += '<span class="card-question-preview">' + esc(truncate(c.question, 80)) + '</span>';
  if (numCriteria > 0) html += '<span class="card-criteria-count">' + numCriteria + ' criteria</span>';
  html += '<span class="card-chevron">&#9662;</span>';
  html += '</div>';

  // Body (expanded)
  html += '<div class="card-body">';

  // Step 1 — Metric
  html += '<div class="step-label">\u2776 What are you testing?</div>';
  html += '<div class="pill-row">';
  METRICS.forEach(function(met) {
    var sel = c.metric === met.id ? ' selected' : '';
    html += '<button class="pill-btn' + sel + '" data-action="set-metric" data-id="' + c._id + '" data-value="' + met.id + '">' + met.icon + ' ' + met.label + '</button>';
  });
  html += '</div>';
  if (m) html += '<div class="step-hint">' + esc(m.hint) + '</div>';

  // Step 2 — Severity (visible once metric selected)
  if (c.metric) {
    html += '<div class="step-label">\u2777 How bad if the AI gets this wrong?</div>';
    html += '<div class="pill-row">';
    SEVERITIES.forEach(function(sev) {
      var sel = c.severity === sev.id ? ' selected' : '';
      html += '<button class="pill-btn' + sel + '" data-action="set-severity" data-id="' + c._id + '" data-value="' + sev.id + '">' + sev.label + '</button>';
    });
    html += '</div>';
    if (s) html += '<div class="step-hint">' + esc(s.hint) + '</div>';
  }

  // Step 3 — Question (visible once severity selected)
  if (c.metric && c.severity) {
    html += '<div class="step-label">\u2778 What would a real person ask?</div>';
    if (c.capability) html += '<span class="capability-badge">' + esc(c.capability) + '</span>';
    html += '<textarea class="question-textarea" data-action="set-question" data-id="' + c._id + '" placeholder="Type the question here\u2026">' + esc(c.question) + '</textarea>';
    html += '<input class="context-input" data-action="set-context" data-id="' + c._id + '" placeholder="Context \u2014 optional: who is asking?" value="' + esc(c.context) + '">';
  }

  // Step 4 — Criteria (visible once question has content)
  if (c.metric && c.severity && c.question) {
    // Should
    html += '<div class="step-label">\u2779 The response SHOULD\u2026</div>';
    html += '<div class="criteria-section">';
    c.should.forEach(function(val, i) {
      html += '<div class="criteria-row">' +
        '<span class="criteria-icon should">\u2713</span>' +
        '<textarea class="criteria-input" data-action="edit-should" data-id="' + c._id + '" data-index="' + i + '">' + esc(val) + '</textarea>' +
        '<button class="criteria-remove" data-action="remove-should" data-id="' + c._id + '" data-index="' + i + '">&times;</button>' +
      '</div>';
    });
    html += '<button class="add-criteria-btn" data-action="add-should" data-id="' + c._id + '">+ Add criterion</button>';
    html += '</div>';

    // Should Not
    html += '<div class="step-label" style="margin-top:0.75rem;">\u2717 The response should NOT\u2026</div>';
    html += '<div class="criteria-section">';
    c.shouldNot.forEach(function(val, i) {
      html += '<div class="criteria-row">' +
        '<span class="criteria-icon shouldnot">\u2717</span>' +
        '<textarea class="criteria-input" data-action="edit-shouldnot" data-id="' + c._id + '" data-index="' + i + '">' + esc(val) + '</textarea>' +
        '<button class="criteria-remove" data-action="remove-shouldnot" data-id="' + c._id + '" data-index="' + i + '">&times;</button>' +
      '</div>';
    });
    html += '<button class="add-criteria-btn" data-action="add-shouldnot" data-id="' + c._id + '">+ Add criterion</button>';
    html += '</div>';
  }

  // Card footer
  html += '<div class="card-footer">';
  html += '<button class="remove-case-btn" data-action="remove-case" data-id="' + c._id + '">Remove test case</button>';
  html += '</div>';

  html += '</div>'; // card-body
  html += '</div>'; // card
  return html;
}

function renderMain() {
  var panel = document.getElementById('main-panel');
  if (!state.template) {
    panel.innerHTML = '<div class="empty-state"><div class="empty-icon">\u{1F4CB}</div><h3>Build a test suite</h3><p>Choose a test suite from the sidebar, or <a href="#" onclick="loadTemplate(\'blank\'); return false;">start from scratch</a>.</p></div>';
    return;
  }

  var t = state.template;
  var html = '';

  // Template heading
  html += '<h2 style="margin:0 0 0.25rem; font-size:1.25rem; color:var(--ev-g800);">' + esc((t.icon || '') + ' ' + (t.name || 'Test Suite Builder')).trim() + '</h2>';

  // Description + source
  html += '<p class="tmpl-desc">' + esc(t.description) + '</p>';
  if (t.source) {
    html += '<p class="tmpl-source">';
    if (t.sourceUrl) {
      html += 'Source: <a href="' + esc(t.sourceUrl) + '" target="_blank" rel="noopener">' + esc(t.source) + '</a>';
    } else {
      html += 'Source: ' + esc(t.source);
    }
    html += '</p>';
  }

  // Coverage bar
  html += '<div class="coverage">' + renderCoverageBar() + '</div>';

  // System prompt
  if (t.systemPrompt) {
    html += '<details class="sys-prompt"><summary>System prompt</summary><pre>' + esc(t.systemPrompt) + '</pre></details>';
  }

  // Cards or empty state
  if (state.cases.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">\u270F\uFE0F</div><h3>No test cases yet</h3><p>Add your first test case below. Start by picking a metric and severity, then write the question a real person would ask.</p></div>';
  } else {
    state.cases.forEach(function(c, i) {
      html += renderCard(c, i);
    });
  }

  // Add case button
  html += '<button class="add-case-btn" data-action="add-case">+ Add test case</button>';

  // Run CTA (only if there are cases)
  if (state.cases.length > 0) {
    html += '<div class="run-cta">';
    html += '<p>Your test suite is ready.</p>';
    html += '<button class="usa-button usa-button--big" onclick="runEval()">Run Evaluation &rarr;</button>';
    html += '</div>';
  }

  panel.innerHTML = html;

  // Update export button state — require at least one complete case
  var hasComplete = state.cases.some(caseComplete);
  document.getElementById('export-btn').disabled = !hasComplete;
}

// ── Data loading ──
function loadTemplate(id) {
  state.selectedTemplateId = id;
  renderSidebar();

  fetch('/api/templates/' + encodeURIComponent(id))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      state.template = data;
      state.cases = (data.builderCases || []).map(function(c) {
        return Object.assign({ _id: state.nextId++ }, c);
      });
      state.expandedCaseId = null;
      renderMain();
    })
    .catch(function() {
      document.getElementById('main-panel').innerHTML = '<p style="color:var(--ev-red);">Failed to load test suite.</p>';
    });
}

// ── Actions ──
function findCase(id) {
  return state.cases.find(function(c) { return c._id === id; });
}

function handleAction(action, id, value, index) {
  var c;
  switch (action) {
    case 'select-template':
      loadTemplate(id);
      break;
    case 'toggle':
      state.expandedCaseId = state.expandedCaseId === Number(id) ? null : Number(id);
      renderMain();
      break;
    case 'set-metric':
      c = findCase(Number(id));
      if (c) { c.metric = value; renderMain(); }
      break;
    case 'set-severity':
      c = findCase(Number(id));
      if (c) { c.severity = value; renderMain(); }
      break;
    case 'add-should':
      c = findCase(Number(id));
      if (c) { c.should.push(''); renderMain(); }
      break;
    case 'add-shouldnot':
      c = findCase(Number(id));
      if (c) { c.shouldNot.push(''); renderMain(); }
      break;
    case 'remove-should':
      c = findCase(Number(id));
      if (c) { c.should.splice(Number(index), 1); renderMain(); }
      break;
    case 'remove-shouldnot':
      c = findCase(Number(id));
      if (c) { c.shouldNot.splice(Number(index), 1); renderMain(); }
      break;
    case 'remove-case':
      state.cases = state.cases.filter(function(x) { return x._id !== Number(id); });
      if (state.expandedCaseId === Number(id)) state.expandedCaseId = null;
      renderMain();
      break;
    case 'add-case':
      var newCase = { _id: state.nextId++, question: '', context: '', metric: '', severity: '', should: [], shouldNot: [], capability: '' };
      state.cases.push(newCase);
      state.expandedCaseId = newCase._id;
      renderMain();
      // scroll to new card
      var el = document.querySelector('[data-case-id="' + newCase._id + '"]');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      break;
  }
}

// ── Event delegation ──
document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.dataset.action;
  var id = btn.dataset.id;
  var value = btn.dataset.value;
  var index = btn.dataset.index;
  // Don't handle text input actions on click
  if (action === 'set-question' || action === 'set-context' || action === 'edit-should' || action === 'edit-shouldnot') return;
  e.preventDefault();
  handleAction(action, id, value, index);
});

// Handle text inputs via input event (debounced to avoid full re-renders)
document.addEventListener('input', function(e) {
  var el = e.target;
  var action = el.dataset.action;
  if (!action) return;
  var id = Number(el.dataset.id);
  var c = findCase(id);
  if (!c) return;

  switch (action) {
    case 'set-question':
      c.question = el.value;
      // If question was empty and now has content, re-render to show step 4
      // If question was non-empty and now empty, re-render to hide step 4
      break;
    case 'set-context':
      c.context = el.value;
      break;
    case 'edit-should':
      c.should[Number(el.dataset.index)] = el.value;
      break;
    case 'edit-shouldnot':
      c.shouldNot[Number(el.dataset.index)] = el.value;
      break;
  }
});

// Re-render when question field loses focus (to update progressive disclosure + card preview)
document.addEventListener('focusout', function(e) {
  if (e.target.dataset.action === 'set-question') {
    renderMain();
    // Restore focus to same field if still editing
  }
});

// ── Export ──
function exportCsv() {
  if (state.cases.length === 0) return;
  // Filter out empty cases
  var validCases = state.cases.filter(function(c) { return c.metric && c.severity && c.question; });
  if (validCases.length === 0) { alert('No complete test cases to export. Each case needs a metric, severity, and question.'); return; }

  fetch('/api/export-sheet', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cases: validCases })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('Export failed');
    return r.blob();
  })
  .then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'evergreen-test-cases.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  })
  .catch(function() { alert('Export failed. Please try again.'); });
}

// ── Run ──
function runEval() {
  if (state.selectedTemplateId && state.selectedTemplateId !== 'blank') {
    window.location.href = '/run?preset=' + encodeURIComponent(state.selectedTemplateId);
  } else {
    window.location.href = '/run';
  }
}

// ── Init ──
document.addEventListener('DOMContentLoaded', function() {
  fetch('/api/templates')
    .then(function(r) { return r.json(); })
    .then(function(templates) {
      state.templates = templates;
      renderSidebar();

      // Check for ?template= query param
      var params = new URLSearchParams(window.location.search);
      var tmplId = params.get('template');
      if (tmplId) {
        loadTemplate(tmplId);
      } else if (templates.length > 0) {
        // Auto-select first non-blank template
        var first = templates.find(function(t) { return t.id !== 'blank'; }) || templates[0];
        loadTemplate(first.id);
      }
    })
    .catch(function() {
      document.getElementById('main-panel').innerHTML = '<p style="color:var(--ev-red);">Failed to load test suites.</p>';
    });
});
</script>
