<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evergreen — Test Suite Builder</title>
  <link rel="stylesheet" href="/assets/css/uswds.min.css">
  <link rel="stylesheet" href="/assets/css/evergreen.css">
</head>
<body class="bg-base-lightest">

<!-- Public Infrastructure Banner -->
<section class="usa-banner" aria-label="Evergreen — digital public infrastructure">
  <div class="usa-banner__header">
    <div class="usa-banner__inner">
      <div class="grid-col-auto">
        <img class="usa-banner__header-flag" src="/assets/img/us_flag_small.png" alt="U.S. flag">
      </div>
      <div class="grid-col-fill">
        <p class="usa-banner__header-text">This is digital public infrastructure &mdash; by the people, for the people.</p>
      </div>
    </div>
  </div>
</section>

<!-- Header -->
<div class="usa-overlay"></div>
<header class="usa-header usa-header--basic">
  <div class="usa-nav-container">
    <div class="usa-navbar">
      <div class="usa-logo">
        <em class="usa-logo__text"><a href="/" title="Evergreen">Evergreen</a></em>
      </div>
    </div>
    <nav aria-label="Primary navigation" class="usa-nav">
      <ul class="usa-nav__primary usa-accordion">
        <li class="usa-nav__primary-item">
          <button id="run-btn" class="usa-button" onclick="runEval()">Run Evaluation &rarr;</button>
        </li>
      </ul>
    </nav>
  </div>
</header>

<!-- Tab bar -->
<div class="bg-white border-bottom border-base-light padding-x-3 padding-y-1">
  <div class="usa-button-group usa-button-group--segmented">
    <div class="usa-button-group__item">
      <button id="tab-library" class="usa-button" type="button" onclick="switchTab('library')">Library</button>
    </div>
    <div class="usa-button-group__item">
      <button id="tab-builder" class="usa-button usa-button--outline" type="button" onclick="switchTab('builder')">Builder<span id="tab-builder-label"></span></button>
    </div>
  </div>
</div>

<!-- Library panel -->
<div id="panel-library" class="padding-4">
  <div id="lib-grid">
    <p class="text-base">Loading&hellip;</p>
  </div>
</div>

<!-- Builder panel -->
<div id="panel-builder" class="padding-4" hidden>
  <div class="grid-container-desktop" id="builder-inner">
    <div class="builder-no-suite">
      <h2>No test suite loaded</h2>
      <p>Browse the Library to choose a preset, or start from scratch.</p>
      <div class="button-row">
        <button class="usa-button usa-button--outline" onclick="switchTab('library')">Browse Library</button>
        <button class="usa-button" onclick="loadTemplate('blank')">Start from Scratch</button>
      </div>
    </div>
  </div>
</div>

<script src="/assets/js/uswds.min.js"></script>
<script>
// ── Constants ──
var METRICS = [
  { id: 'safety',        label: 'Safety',        hint: 'What should the AI never say or imply?' },
  { id: 'accuracy',      label: 'Accuracy',       hint: 'What facts must the response get right?' },
  { id: 'ease-of-use',   label: 'Ease of Use',    hint: 'Can a non-expert understand this without help?' },
  { id: 'effectiveness', label: 'Effectiveness',  hint: 'Does it help the person take the right next step?' },
  { id: 'emotion',       label: 'Emotion',        hint: 'Does it handle sensitive situations with empathy?' }
];
var SEVERITIES = [
  { id: 'critical', label: 'Critical', hint: 'Wrong answer could cost someone money, benefits, or safety' },
  { id: 'high',     label: 'High',     hint: 'Significant confusion or misdirection' },
  { id: 'medium',   label: 'Medium',   hint: 'Noticeable quality issue, but the person can recover' },
  { id: 'low',      label: 'Low',      hint: 'Minor quality issue, unlikely to cause harm' }
];

// ── State ──
var state = {
  templates: [],
  selectedTemplateId: null,
  template: null,
  cases: [],
  expandedCaseId: null,
  nextId: 1,
  currentTab: 'library'
};

// ── Helpers ──
function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '\u2026' : (s || ''); }
function metricInfo(id) { return METRICS.find(function(m) { return m.id === id; }) || null; }
function sevInfo(id)    { return SEVERITIES.find(function(s) { return s.id === id; }) || null; }
function formatPersona(id) {
  return id.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
}
function caseComplete(c) { return c.metric && c.severity && c.question && (c.should.length > 0 || c.shouldNot.length > 0); }

// ── Tab switching ──
function switchTab(tab) {
  state.currentTab = tab;
  document.getElementById('panel-library').hidden = tab !== 'library';
  document.getElementById('panel-builder').hidden = tab !== 'builder';
  document.getElementById('tab-library').className = 'usa-button' + (tab === 'library' ? '' : ' usa-button--outline');
  document.getElementById('tab-builder').className = 'usa-button' + (tab === 'builder' ? '' : ' usa-button--outline');
  if (tab === 'builder' && state.template) renderBuilder();
}

// ── Library rendering ──
function renderCard(t) {
  var isActive = t.id === state.selectedTemplateId;
  if (t.id === 'blank') {
    var btnLabel = isActive ? 'Currently editing' : 'Start building \u2192';
    return '<li class="usa-card tablet:grid-col-4">' +
      '<div class="usa-card__container lib-card-start' + (isActive ? ' border-primary' : '') + '">' +
        '<div class="usa-card__header"><h2 class="usa-card__heading">Start your own</h2></div>' +
        '<div class="usa-card__body"><p>Build a test suite from scratch, tailored to your specific AI tool.</p></div>' +
        '<div class="usa-card__footer">' +
          '<button class="usa-button" style="width:100%;" data-action="load-template" data-id="blank">' + btnLabel + '</button>' +
        '</div>' +
      '</div></li>';
  }
  var metaParts = [];
  if (t.caseCount) metaParts.push(t.caseCount + ' cases');
  if (t.author)    metaParts.push('by ' + esc(t.author));
  metaParts.push(t.multiTurn ? 'multi-turn' : 'single-turn');
  var btnLabel2 = isActive ? 'Currently editing' : 'Customize \u2192';
  return '<li class="usa-card tablet:grid-col-4">' +
    '<div class="usa-card__container' + (isActive ? ' border-primary' : '') + '">' +
      '<div class="usa-card__header">' +
        '<h2 class="usa-card__heading">' + esc(t.domain || t.name) + '</h2>' +
        '<p class="lib-card-meta">' + metaParts.join(' \u00b7 ') + '</p>' +
      '</div>' +
      '<div class="usa-card__body"><p>' + esc(t.description || '') + '</p></div>' +
      '<div class="usa-card__footer">' +
        '<button class="usa-button' + (isActive ? '' : ' usa-button--outline') + '" style="width:100%;" ' +
          'data-action="load-template" data-id="' + esc(t.id) + '">' + btnLabel2 + '</button>' +
      '</div>' +
    '</div></li>';
}

function renderSection(label, templates) {
  if (templates.length === 0) return '';
  return '<p class="lib-section-label">' + label + '</p>' +
    '<ul class="usa-card-group margin-bottom-4">' +
    templates.map(renderCard).join('') +
    '</ul>';
}

function renderLibrary() {
  var mine   = state.templates.filter(function(t) { return !t.author; });
  var theirs = state.templates.filter(function(t) { return !!t.author; });

  // Blank card first within "mine"
  mine.sort(function(a, b) {
    if (a.id === 'blank') return -1;
    if (b.id === 'blank') return 1;
    return 0;
  });

  document.getElementById('lib-grid').innerHTML =
    renderSection('My organization\u2019s tests', mine) +
    renderSection('My partner organizations\u2019 tests', theirs);
}

// ── Builder rendering ──
function renderCoverageBar() {
  var counts = {};
  METRICS.forEach(function(m) { counts[m.id] = 0; });
  state.cases.forEach(function(c) { if (c.metric && counts.hasOwnProperty(c.metric)) counts[c.metric]++; });
  var total = state.cases.length;
  var html = '<span class="cov-bar-label">Coverage</span>';
  METRICS.forEach(function(m) {
    var n = counts[m.id];
    html += '<span class="cov-bar-item' + (n === 0 ? ' zero' : '') + '">' +
      '<span class="cov-bar-swatch" style="background:' + metricColor(m.id) + '"></span>' +
      esc(m.label) + ' <span class="cov-bar-count">' + n + '</span>' +
    '</span>';
  });
  html += '<span class="cov-bar-total">' + total + ' total</span>';
  return html;
}

function metricColor(id) {
  var map = {
    'safety': 'var(--ev-safety)', 'accuracy': 'var(--ev-accuracy)', 'ease-of-use': 'var(--ev-ease-of-use)',
    'effectiveness': 'var(--ev-effectiveness)', 'emotion': 'var(--ev-emotion)'
  };
  return map[id] || '#adb5bd';
}

function renderRow(c, overallIdx) {
  var isExpanded = state.expandedCaseId === c._id;
  var sev = sevInfo(c.severity);
  var numCriteria = c.should.length + c.shouldNot.length;

  var sevHtml = sev
    ? '<span class="sev-badge sev-' + c.severity + '">' + esc(sev.label) + '</span>'
    : '<span class="sev-badge sev-empty">No severity</span>';

  var qHtml = c.question
    ? '<span class="case-row-question">' + esc(truncate(c.question, 90)) + '</span>'
    : '<span class="case-row-question empty">No question yet&hellip;</span>';

  var chipHtml = numCriteria > 0
    ? '<span class="criteria-chip">' + numCriteria + '\u00a0' + (numCriteria === 1 ? 'criterion' : 'criteria') + '</span>'
    : '';
  var personaHtml = c.persona
    ? '<span class="persona-badge">' + esc(formatPersona(c.persona)) + '</span>'
    : '';
  var multiTurnHtml = c.turns && c.turns.length > 0
    ? '<span class="multiturn-chip">multi-turn</span>'
    : '';

  var html = '<div class="usa-accordion margin-bottom-1" data-case-id="' + c._id + '">';

  html += '<h4 class="usa-accordion__heading">' +
    '<button type="button" class="usa-accordion__button" ' +
    'aria-expanded="' + (isExpanded ? 'true' : 'false') + '" ' +
    'aria-controls="case-content-' + c._id + '" ' +
    'data-action="toggle" data-id="' + c._id + '">' +
    '<span>' +
      '<span class="case-row-num">' + (overallIdx + 1) + '</span>' +
      sevHtml + personaHtml + multiTurnHtml + qHtml + chipHtml +
    '</span>' +
    '</button></h4>';

  html += '<div id="case-content-' + c._id + '" class="usa-accordion__content"' +
    (isExpanded ? '' : ' hidden') + '>';

  // Category (metric)
  html += '<p class="usa-label margin-top-0">Category</p>';
  html += '<div class="pill-row">';
  METRICS.forEach(function(m) {
    var sel = c.metric === m.id ? ' selected' : '';
    html += '<button class="pill-btn' + sel + '" data-action="set-metric" data-id="' + c._id + '" data-value="' + m.id + '">' + m.label + '</button>';
  });
  html += '</div>';

  // Severity
  html += '<p class="usa-label margin-top-3">How serious is it if the AI gets this wrong?</p>';
  html += '<div class="pill-row">';
  SEVERITIES.forEach(function(sv) {
    var sel = c.severity === sv.id ? ' selected' : '';
    html += '<button class="pill-btn' + sel + '" data-action="set-severity" data-id="' + c._id + '" data-value="' + sv.id + '">' + sv.label + '</button>';
  });
  html += '</div>';
  if (sev) html += '<span class="usa-hint display-block margin-top-1">' + esc(sev.hint) + '</span>';

  // Conversation history (multi-turn preset cases)
  if (c.turns && c.turns.length > 0) {
    html += '<p class="usa-label margin-top-3">Prior conversation <span class="conv-readonly-note">(seeded context — read only)</span></p>';
    html += '<div class="conv-history">';
    c.turns.forEach(function(turn) {
      html += '<div class="conv-turn conv-turn-' + turn.role + '">' +
        '<span class="conv-turn-label">' + (turn.role === 'user' ? 'User' : 'Assistant') + '</span>' +
        '<span class="conv-turn-text">' + esc(turn.content) + '</span>' +
      '</div>';
    });
    html += '</div>';
  }

  // Question
  html += '<p class="usa-label margin-top-3">What would a real person ask?</p>';
  if (c.capability) html += '<span class="capability-badge">' + esc(c.capability) + '</span>';
  html += '<textarea class="usa-textarea" data-action="set-question" data-id="' + c._id + '" placeholder="Type the question here\u2026">' + esc(c.question) + '</textarea>';
  html += '<input class="usa-input margin-top-2" data-action="set-context" data-id="' + c._id + '" placeholder="Context \u2014 optional: who is asking?" value="' + esc(c.context) + '">';

  // Criteria (once question is filled)
  if (c.question) {
    html += '<p class="usa-label margin-top-3">The response SHOULD\u2026</p>';
    html += '<div class="criteria-section">';
    c.should.forEach(function(val, i) {
      html += '<div class="criteria-row">' +
        '<span class="criteria-icon should">\u2713</span>' +
        '<textarea class="usa-textarea criteria-input" rows="2" data-action="edit-should" data-id="' + c._id + '" data-index="' + i + '">' + esc(val) + '</textarea>' +
        '<button class="criteria-remove" data-action="remove-should" data-id="' + c._id + '" data-index="' + i + '">&times;</button>' +
      '</div>';
    });
    html += '<button class="usa-button usa-button--unstyled text-primary margin-top-1" data-action="add-should" data-id="' + c._id + '">+ Add criterion</button>';
    html += '</div>';

    html += '<p class="usa-label margin-top-3">The response should NOT\u2026</p>';
    html += '<div class="criteria-section">';
    c.shouldNot.forEach(function(val, i) {
      html += '<div class="criteria-row">' +
        '<span class="criteria-icon shouldnot">\u2717</span>' +
        '<textarea class="usa-textarea criteria-input" rows="2" data-action="edit-shouldnot" data-id="' + c._id + '" data-index="' + i + '">' + esc(val) + '</textarea>' +
        '<button class="criteria-remove" data-action="remove-shouldnot" data-id="' + c._id + '" data-index="' + i + '">&times;</button>' +
      '</div>';
    });
    html += '<button class="usa-button usa-button--unstyled text-primary margin-top-1" data-action="add-shouldnot" data-id="' + c._id + '">+ Add criterion</button>';
    html += '</div>';
  }

  html += '<div class="case-row-footer">' +
    '<button class="usa-button usa-button--unstyled text-error" data-action="remove-case" data-id="' + c._id + '">Remove test case</button>' +
  '</div>';

  html += '</div>'; // usa-accordion__content
  html += '</div>'; // usa-accordion
  return html;
}

function renderBuilder() {
  if (!state.template) return;
  var t = state.template;
  var html = '';

  // Back to library (not for blank/scratch)
  if (state.selectedTemplateId && state.selectedTemplateId !== 'blank') {
    html += '<button class="usa-button usa-button--unstyled margin-bottom-3" onclick="switchTab(\'library\')">\u2190 Library</button>';
  }

  // Header
  html += '<div class="margin-bottom-3">' +
    '<h1 class="font-heading-xl margin-top-0 margin-bottom-05">' + esc(t.name || 'Test Suite') + '</h1>';
  if (t.description) html += '<p class="font-body-sm text-base margin-0 margin-bottom-05">' + esc(t.description) + '</p>';
  if (t.source) {
    html += '<p class="font-body-xs text-base-dark margin-0">Source: ';
    html += t.sourceUrl
      ? '<a class="usa-link" href="' + esc(t.sourceUrl) + '" target="_blank" rel="noopener">' + esc(t.source) + '</a>'
      : esc(t.source);
    html += '</p>';
  }
  html += '</div>';

  // Coverage bar
  html += '<div class="cov-bar">' + renderCoverageBar() + '</div>';

  // System prompt
  if (t.systemPrompt) {
    html += '<details class="sys-prompt margin-bottom-3"><summary>System prompt</summary><pre>' + esc(t.systemPrompt) + '</pre></details>';
  }

  // Metric groups
  var globalIdx = 0;
  METRICS.forEach(function(m) {
    var groupCases = state.cases.filter(function(c) { return c.metric === m.id; });
    html += '<div class="metric-group mg-' + m.id + '">';
    html += '<div class="metric-group-header">' +
      '<span class="metric-group-swatch"></span>' +
      '<span class="metric-group-name">' + esc(m.label) + '</span>' +
      '<span class="metric-group-count">' + groupCases.length + '\u00a0' + (groupCases.length === 1 ? 'case' : 'cases') + '</span>' +
      '<button class="usa-button usa-button--unstyled text-primary font-body-sm margin-left-auto" data-action="add-case-metric" data-value="' + m.id + '">+ Add</button>' +
    '</div>';
    if (groupCases.length > 0) {
      html += '<div>';
      groupCases.forEach(function(c) { html += renderRow(c, globalIdx++); });
      html += '</div>';
    } else {
      html += '<p class="metric-group-empty">No cases yet &mdash; click + Add to create one.</p>';
    }
    html += '</div>';
  });

  // Unassigned group
  var unassigned = state.cases.filter(function(c) { return !c.metric; });
  if (unassigned.length > 0) {
    html += '<div class="metric-group mg-unassigned">';
    html += '<div class="metric-group-header">' +
      '<span class="metric-group-swatch"></span>' +
      '<span class="metric-group-name">Unassigned</span>' +
      '<span class="metric-group-count">' + unassigned.length + '\u00a0' + (unassigned.length === 1 ? 'case' : 'cases') + '</span>' +
    '</div>';
    html += '<div>';
    unassigned.forEach(function(c) { html += renderRow(c, globalIdx++); });
    html += '</div>';
    html += '</div>';
  }

  // Run CTA
  if (state.cases.length > 0) {
    html += '<div class="run-cta">' +
      '<p>Ready to run? Your test suite has ' + state.cases.length + '\u00a0' + (state.cases.length === 1 ? 'case' : 'cases') + '.</p>' +
      '<button class="usa-button" onclick="runEval()">Run Evaluation \u2192</button>' +
    '</div>';
  }

  document.getElementById('builder-inner').innerHTML = html;
  document.getElementById('tab-builder-label').textContent = t.name ? ' \u2014 ' + t.name : '';
}

// ── Data loading ──
function loadTemplate(id) {
  state.selectedTemplateId = id;
  renderLibrary(); // update active state on cards
  fetch('/api/templates/' + encodeURIComponent(id))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      state.template = data;
      state.cases = (data.builderCases || []).map(function(c) {
        return Object.assign({ _id: state.nextId++ }, c);
      });
      state.expandedCaseId = null;
      switchTab('builder');
    })
    .catch(function() {
      alert('Failed to load test suite. Please try again.');
    });
}

// ── Actions ──
function findCase(id) {
  return state.cases.find(function(c) { return c._id === id; });
}

function handleAction(action, id, value, index) {
  var c;
  switch (action) {
    case 'load-template':
      loadTemplate(id);
      break;
    case 'toggle':
      state.expandedCaseId = state.expandedCaseId === Number(id) ? null : Number(id);
      renderBuilder();
      break;
    case 'set-metric':
      c = findCase(Number(id));
      if (c) { c.metric = value; renderBuilder(); }
      break;
    case 'set-severity':
      c = findCase(Number(id));
      if (c) { c.severity = value; renderBuilder(); }
      break;
    case 'add-should':
      c = findCase(Number(id));
      if (c) { c.should.push(''); renderBuilder(); }
      break;
    case 'add-shouldnot':
      c = findCase(Number(id));
      if (c) { c.shouldNot.push(''); renderBuilder(); }
      break;
    case 'remove-should':
      c = findCase(Number(id));
      if (c) { c.should.splice(Number(index), 1); renderBuilder(); }
      break;
    case 'remove-shouldnot':
      c = findCase(Number(id));
      if (c) { c.shouldNot.splice(Number(index), 1); renderBuilder(); }
      break;
    case 'remove-case':
      state.cases = state.cases.filter(function(x) { return x._id !== Number(id); });
      if (state.expandedCaseId === Number(id)) state.expandedCaseId = null;
      renderBuilder();
      break;
    case 'add-case-metric':
      var newCase = { _id: state.nextId++, question: '', context: '', metric: value, severity: '', should: [], shouldNot: [], capability: '' };
      state.cases.push(newCase);
      state.expandedCaseId = newCase._id;
      renderBuilder();
      var el = document.querySelector('[data-case-id="' + newCase._id + '"]');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      break;
  }
}

// ── Event delegation ──
document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.dataset.action;
  if (action === 'set-question' || action === 'set-context' || action === 'edit-should' || action === 'edit-shouldnot') return;
  e.preventDefault();
  handleAction(action, btn.dataset.id, btn.dataset.value, btn.dataset.index);
});

document.addEventListener('input', function(e) {
  var el = e.target;
  var action = el.dataset.action;
  if (!action) return;
  var c = findCase(Number(el.dataset.id));
  if (!c) return;
  switch (action) {
    case 'set-question':   c.question = el.value; break;
    case 'set-context':    c.context  = el.value; break;
    case 'edit-should':    c.should[Number(el.dataset.index)]    = el.value; break;
    case 'edit-shouldnot': c.shouldNot[Number(el.dataset.index)] = el.value; break;
  }
});

document.addEventListener('focusout', function(e) {
  if (e.target.dataset.action === 'set-question' && state.currentTab === 'builder') {
    renderBuilder();
  }
});

// ── Run ──
function runEval() {
  if (state.selectedTemplateId && state.selectedTemplateId !== 'blank') {
    window.location.href = '/run?preset=' + encodeURIComponent(state.selectedTemplateId);
  } else {
    window.location.href = '/run';
  }
}

// ── Init ──
document.addEventListener('DOMContentLoaded', function() {
  fetch('/api/templates')
    .then(function(r) { return r.json(); })
    .then(function(templates) {
      state.templates = templates;
      renderLibrary();
      var params = new URLSearchParams(window.location.search);
      var tmplId = params.get('template');
      if (tmplId) loadTemplate(tmplId);
    })
    .catch(function() {
      document.getElementById('lib-grid').innerHTML =
        '<li><p class="text-error padding-2">Failed to load test suites.</p></li>';
    });
});
</script>
</body>
</html>
